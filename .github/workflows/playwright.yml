name: Günlük Playwright Testleri

on:
  schedule:
    - cron: '10 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-dep

      - run: npx playwright test --reporter=js
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.json

      - name: test-results.json kaydet
        if: always()
        run: |
          git config user.name "github-actions
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-results.json
          git diff --cached --quiet || git commit -m "ci: test sonuçları $(date -u +%Y-%m-%d)"
          git push
